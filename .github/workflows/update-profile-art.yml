name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r scripts/requirements.txt

      - name: Refresh contributions dataset
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated profile art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution heatmap"
          file_pattern: data/contributions.json contrib-heatmap.svg
          skip_dirty_check: false
          skip_fetch: true

